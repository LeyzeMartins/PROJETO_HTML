<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo - Dos Devs!!!</title>
</head>
<!-- 
HTML só possui títulos do h1 até o h6.

h1 → título principal da página
h2 → seção
h3 → subseção
h4 → detalhe
h5 → subdetalhe
h6 → nível mais baixo de título

Não existe h7 no HTML.
-->
<body>
    <h1>Olá Futura Dev!👌</h1>    
    <h2>Olá Futura Dev!👌</h2>
    <h3>Olá Futura Dev!👌</h3>
    <h4>Olá Futura Dev!👌</h4>
    <h5>Olá Futura Dev!👌</h5>
    <h6>Olá Futura Dev!👌</h6>
</body>
</html>
