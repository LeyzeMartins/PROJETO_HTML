<html lang="pt-BR">
<head>
    <!-- aqui eu defini o tipo de caracteres (acentos, etc) -->
    <meta charset="UTF-8">

    <!-- isso faz o site se adaptar ao celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- título da aba do navegador -->
    <title>Aula Java Script👌</title>
    
</head>

<body>

  <!-- título principal da página -->
  <h1 id="titulo">Página com JavaScript</h1>

  <!-- segundo título (subtítulo) -->
  <h1 id="subtitulo">Seja bem vindo</h1>

  <!-- botão que chama a função para alterar cor e aumentar fonte -->
  <button onclick="mudarCorDaPagina()">Alterar</button>

  <!-- botão que chama a função para resetar tudo -->
  <button onclick="resetarCor()">Resetar</button>

  <!-- aqui eu conecto meu arquivo JavaScript externo -->
  <script src="javascript.js"></script>

</body>
</html>
