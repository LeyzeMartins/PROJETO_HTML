<!DOCTYPE html>
<html lang="pt-BR">
<head>
 
    <title>Tabela HTML</title>
       
    <style>
        caption{
            font-size: 20px ;
            color: rgb(222, 93, 0);
            border: 1px solid orangered;
            background-color: rgb(176, 230, 230);
            font-weight: bolder;
            font:verdana;
        }
        table{
            width: 50%;
            border-collapse: collapse;
        }
        th{
            color: rgb(146, 62, 225);
            font-size: 20px;
            border-bottom: 1px solid #000;
        }
      td{
        text-align: center;
        color:rgb(41, 12, 25);
         border: 1px solid #000;
      }
      tr{
        background-color: #a1a0a0c3;
      }
      body{
        background-color:rgb(241, 243, 244);
      }
    </style>
</head>

 <body>
    <table border=" 1">
        <caption>Lista de pessoas</caption>
        <tr>
            <th>Nome</th>
            <th>Data Nascimento</th>
            <th>Endereço</th>
        </tr>
        <tr>
            <td>Julio</td>

            <td>Rua Barão Aquino</td>
            
          
        </tr>
        <tr>
            <td>Fonteles</td>

        </tr>

    </table>
 </body>









</html>
